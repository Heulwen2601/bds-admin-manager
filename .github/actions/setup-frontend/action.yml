name: 'Setup Frontend (Angular)'
description: 'Setup Node.js and install npm dependencies for the Angular frontend project'

inputs:
  node-version:
    description: 'Node.js version to install'
    required: false
    default: '22'

runs:
  using: 'composite'
  steps:
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ inputs.node-version }}
        cache: 'npm'
        cache-dependency-path: frontend/bds-admin-ui/package-lock.json

    - name: Install npm dependencies
      shell: bash
      working-directory: frontend/bds-admin-ui
      run: npm ci --legacy-peer-deps
