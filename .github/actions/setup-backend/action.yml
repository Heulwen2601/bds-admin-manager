name: 'Setup Backend (.NET)'
description: 'Setup .NET SDK and restore NuGet packages for the backend project'

inputs:
  dotnet-version:
    description: '.NET SDK version to install'
    required: false
    default: '9.0.x'

runs:
  using: 'composite'
  steps:
    - name: Setup .NET SDK
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ inputs.dotnet-version }}

    - name: Cache NuGet packages
      uses: actions/cache@v4
      with:
        path: ~/.nuget/packages
        key: ${{ runner.os }}-nuget-${{ hashFiles('backend/**/*.csproj') }}
        restore-keys: |
          ${{ runner.os }}-nuget-

    - name: Restore NuGet packages
      shell: bash
      working-directory: backend
      run: dotnet restore
